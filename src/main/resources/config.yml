pve:
  mob-spawn-interval-seconds: 30
  mobs-per-player: 2
  spawn-min-distance: 24.0
  spawn-max-distance: 80.0
  phases:
    early:
      start-progress: 0.0
      spawn-interval-seconds: 35
      group-size: 1
      max-alive-mobs: 24
      health-multiplier: 1.0
    mid:
      start-progress: 0.35
      spawn-interval-seconds: 22
      group-size: 2
      max-alive-mobs: 42
      health-multiplier: 1.25
    late:
      start-progress: 0.70
      spawn-interval-seconds: 12
      group-size: 3
      max-alive-mobs: 64
      health-multiplier: 1.75

extraction:
  radius: 5.0
  vertical-tolerance: 4.0
  hold-seconds: 5

loot:
  death-drop-pickup-radius: 2.5
  mob-kill-reward:
    SCRAP: 2
    CLOTH: 1
    STONE: 1
    IRON_FRAGMENTS: 1
    GEMS: 0
  tables:
    supply-crate:
      rolls: 3
      entries:
        - type: SCRAP
          min: 2
          max: 5
          weight: 45
        - type: CLOTH
          min: 1
          max: 4
          weight: 30
        - type: IRON_FRAGMENTS
          min: 1
          max: 3
          weight: 18
        - type: GEMS
          min: 1
          max: 1
          weight: 7
    scrap-cache:
      rolls: 2
      entries:
        - type: SCRAP
          min: 3
          max: 7
          weight: 65
        - type: CLOTH
          min: 1
          max: 3
          weight: 25
        - type: IRON_FRAGMENTS
          min: 1
          max: 2
          weight: 10
    ore-node:
      rolls: 2
      entries:
        - type: STONE
          min: 3
          max: 8
          weight: 55
        - type: IRON_FRAGMENTS
          min: 2
          max: 5
          weight: 35
        - type: GEMS
          min: 1
          max: 2
          weight: 10
    rare-cache:
      rolls: 3
      entries:
        - type: IRON_FRAGMENTS
          min: 2
          max: 5
          weight: 45
        - type: GEMS
          min: 1
          max: 3
          weight: 35
        - type: SCRAP
          min: 3
          max: 6
          weight: 20
    gem-cache:
      rolls: 2
      entries:
        - type: GEMS
          min: 1
          max: 4
          weight: 70
        - type: IRON_FRAGMENTS
          min: 2
          max: 4
          weight: 30
    objective-cache:
      rolls: 4
      entries:
        - type: IRON_FRAGMENTS
          min: 3
          max: 6
          weight: 45
        - type: GEMS
          min: 1
          max: 3
          weight: 35
        - type: SCRAP
          min: 4
          max: 8
          weight: 20

stash:
  persistence-enabled: true
