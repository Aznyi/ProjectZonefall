pve:
  mob-spawn-interval-seconds: 20
  mobs-per-player: 2
  spawn-min-distance: 12.0
  spawn-max-distance: 24.0

extraction:
  radius: 5.0
  vertical-tolerance: 4.0
  hold-seconds: 5

loot:
  death-drop-pickup-radius: 2.5
  mob-kill-reward:
    SCRAP: 2
    CLOTH: 1
    STONE: 1
    IRON_FRAGMENTS: 1
    GEMS: 0
  tables:
    supply-crate:
      rolls: 3
      entries:
        - type: SCRAP
          min: 2
          max: 5
          weight: 45
        - type: CLOTH
          min: 1
          max: 4
          weight: 30
        - type: IRON_FRAGMENTS
          min: 1
          max: 3
          weight: 18
        - type: GEMS
          min: 1
          max: 1
          weight: 7
    scrap-cache:
      rolls: 2
      entries:
        - type: SCRAP
          min: 3
          max: 7
          weight: 65
        - type: CLOTH
          min: 1
          max: 3
          weight: 25
        - type: IRON_FRAGMENTS
          min: 1
          max: 2
          weight: 10
    ore-node:
      rolls: 2
      entries:
        - type: STONE
          min: 3
          max: 8
          weight: 55
        - type: IRON_FRAGMENTS
          min: 2
          max: 5
          weight: 35
        - type: GEMS
          min: 1
          max: 2
          weight: 10

stash:
  persistence-enabled: true
